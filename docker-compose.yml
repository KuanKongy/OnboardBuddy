services:
  backend-api:
    build:
      context: .
      dockerfile: backend/Dockerfile.api
    env_file:
      - backend/.env
    volumes:
      - ./backend/github-app.pem:/app/backend/github-app.pem:ro
    ports:
      - "3000:3000"

  backend-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    env_file:
      - backend/.env
    volumes:
      - ./backend/github-app.pem:/app/backend/github-app.pem:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend-api
